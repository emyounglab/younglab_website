<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      {% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}
    </title>

    {% assign page_desc = page.description | default: site.description %}
    <meta name="description" content="{{ page_desc | escape }}" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="{{ site.title }}" />
    <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}" />
    <meta property="og:description" content="{{ page_desc | escape }}" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />

    <!-- Favicon: add favicon.ico or favicon.png to /assets/img/ -->
    <link rel="icon" href="{{ '/assets/img/favicon.png' | relative_url }}" type="image/png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>

  <body>
    {% include nav.html %}

    <main class="container">
      {{ content }}
    </main>

    {% include footer.html %}
  </body>
</html>
