<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      {% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}
    </title>

    {% assign page_desc = page.description | default: site.description %}
    <meta name="description" content="{{ page_desc | escape }}" />

    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="{{ site.title }}" />
    <meta property="og:title" content="{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}" />
    <meta property="og:description" content="{{ page_desc | escape }}" />
    <meta property="og:url" content="{{ page.url | absolute_url }}" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{{ '/assets/img/favicon/favicon-96x96.png' | relative_url }}" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon/favicon.svg' | relative_url }}" />
    <link rel="shortcut icon" href="{{ '/assets/img/favicon/favicon.ico' | relative_url }}" />
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/favicon/apple-touch-icon.png' | relative_url }}" />
    <meta name="apple-mobile-web-app-title" content="{{ site.title }}" />
    <link rel="manifest" href="{{ '/assets/img/favicon/site.webmanifest' | relative_url }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>

  <body>
    {% include nav.html %}

    <main class="container">
      {{ content }}
    </main>

    {% include footer.html %}

    <script data-goatcounter="https://younglab.goatcounter.com/count"
            async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
